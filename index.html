<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هير ماجيك | المتجر المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

        :root {
            --p: #b89156; /* اللون الذهبي لهير ماجيك */
            --bg: #ffffff;
            --txt: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--txt); padding-bottom: 80px; }

        /* الهيدر */
        header {
            background: #fff; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f2f2f2; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: #000; text-decoration: none; }
        .nav-icons { display: flex; gap: 15px; font-size: 1.2rem; }

        /* البانر الإعلاني */
        .main-banner { width: 100%; max-height: 450px; overflow: hidden; background: #f9f9f9; }
        .main-banner img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* عنوان القسم */
        .section-title { text-align: center; padding: 30px 0; font-size: 1.4rem; font-weight: 700; position: relative; }
        .section-title::after { content: ''; display: block; width: 50px; height: 2px; background: var(--p); margin: 10px auto; }

        /* شبكة المنتجات */
        .container { padding: 0 5%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: #fff; text-align: center; transition: 0.3s; }
        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; background: #f5f5f5; margin-bottom: 10px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { font-size: 0.9rem; font-weight: 600; height: 40px; overflow: hidden; margin-bottom: 5px; }
        .p-price { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
        .add-btn { background: transparent; color: var(--p); border: 1px solid var(--p); width: 100%; padding: 8px; border-radius: 5px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: var(--p); color: #fff; }

        /* أيقونة الواتساب العائمة */
        .whatsapp-float {
            position: fixed; bottom: 85px; left: 20px;
            background: #25d366; color: white; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 2px 5px 15px rgba(0,0,0,0.2); z-index: 1000;
            text-decoration: none; transition: 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.75rem; text-align: center; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--p); }

        /* لوحة التحكم الجانبية (مخفية للزبون وتفتح بكلمة سر أو رابط خاص) */
        #admin-panel { display: none; background: #fff; padding: 20px; border: 2px solid var(--p); border-radius: 15px; margin: 20px 5%; }
        .admin-btn { background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleAdmin()" class="admin-btn">لوحة التاجر</div>
    <a href="#" class="logo">HER MAGIC</a>
    <div class="nav-icons"><i class="fas fa-shopping-bag"></i></div>
</header>

<div id="admin-panel">
    <h3 style="color:var(--p)">⚙️ إعدادات المتجر</h3><br>
    <label>لون الهوية:</label> <input type="color" id="colorInput" onchange="updateTheme()">
    <br><br>
    <label>رفع بانر جديد:</label> <input type="file" accept="image/*" onchange="updateBanner(this)">
    <hr style="margin:20px 0;">
    <h3>📦 إضافة منتج</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج" style="width:100%; padding:8px; margin:5px 0;">
    <input type="number" id="pPrice" placeholder="السعر" style="width:100%; padding:8px; margin:5px 0;">
    <input type="file" id="pImg" accept="image/*" onchange="handleProductImg(this)" style="margin:10px 0;">
    <button onclick="addProduct()" style="width:100%; padding:10px; background:var(--p); color:#fff; border:none; border-radius:5px;">نشر المنتج</button>
</div>

<div class="main-banner">
    <img id="banner-img" src="https://via.placeholder.com/1200x450?text=عرض+خاص+من+هير+ماجيك" alt="Banner">
</div>

<div class="section-title">جميع المنتجات</div>

<div class="container">
    <div class="grid" id="products-grid">
        </div>
</div>

<a href="https://wa.me/0502505898" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i>الرئيسية</a>
    <a href="#" class="nav-item"><i class="fas fa-th-large"></i>الأقسام</a>
    <a href="#" class="nav-item"><i class="fas fa-shopping-cart"></i>السلة</a>
    <a href="#" class="nav-item"><i class="fas fa-user"></i>حسابي</a>
</nav>

<script>
    let storeData = JSON.parse(localStorage.getItem('myStoreData')) || [];
    let settings = JSON.parse(localStorage.getItem('storeSettings')) || { p: '#b89156', banner: '' };
    let tempImg = "";

    // تطبيق الإعدادات عند الفتح
    function applyInit() {
        document.documentElement.style.setProperty('--p', settings.p);
        if(settings.banner) document.getElementById('banner-img').src = settings.banner;
        renderProducts();
    }

    function toggleAdmin() {
        let panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function updateTheme() {
        let val = document.getElementById('colorInput').value;
        settings.p = val;
        localStorage.setItem('storeSettings', JSON.stringify(settings));
        location.reload();
    }

    function updateBanner(input) {
        const reader = new FileReader();
        reader.onload = e => {
            settings.banner = e.target.result;
            localStorage.setItem('storeSettings', JSON.stringify(settings));
            location.reload();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function handleProductImg(input) {
        const reader = new FileReader();
        reader.onload = e => tempImg = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function addProduct() {
        let name = document.getElementById('pTitle').value;
        let price = document.getElementById('pPrice').value;
        if(!name || !price || !tempImg) return alert("أكمل البيانات");
        storeData.push({ id: Date.now(), name, price, img: tempImg });
        localStorage.setItem('myStoreData', JSON.stringify(storeData));
        alert("تم الحفظ!");
        location.reload();
    }

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = storeData.map(p => `
            <div class="card">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="p-name">${p.name}</div>
                <div class="p-price">${p.price} ر.س</div>
                <button class="add-btn">أضف للسلة</button>
            </div>
        `).join('');
    }

    applyInit();
</script>
</body>
</html>
